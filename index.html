<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#eef4f2">
    <title>爷爷的新耳朵</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="src/styles.css">
  </head>
  <body>
    <div class="app-shell" data-contrast="soft" data-font-scale="large">
      <header class="top-bar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">耳</span>
          <div>
            <h1>爷爷的新耳朵</h1>
            <p id="statusText">准备开始</p>
          </div>
        </div>

        <div class="status-pill" id="statusPill" data-state="idle">
          <span class="status-dot" aria-hidden="true"></span>
          <span id="statusLabel">待机</span>
        </div>
      </header>

      <main class="conversation-panel" aria-live="polite">
        <section class="caption-stage" id="captionStage" aria-label="实时字幕">
          <div class="empty-state" id="emptyState">
            <strong>准备好了</strong>
            <span>待机</span>
          </div>
          <div class="transcript-list" id="transcriptList"></div>
          <div class="partial-caption" id="partialCaption" hidden></div>
        </section>
      </main>

      <aside class="control-panel" aria-label="控制区">
        <div class="primary-controls">
          <button class="main-action" id="startButton" type="button">
            <span aria-hidden="true">●</span>
            <span>开始</span>
          </button>
          <button class="icon-action" id="pauseButton" type="button" disabled aria-label="暂停">
            <span aria-hidden="true">Ⅱ</span>
          </button>
          <button class="icon-action" id="stopButton" type="button" disabled aria-label="结束">
            <span aria-hidden="true">■</span>
          </button>
        </div>

        <details class="settings-panel" id="settingsPanel" open>
          <summary>设置</summary>
          <div class="settings-grid">
            <label class="field">
              <span>讲话语言</span>
              <select id="sourceLanguage">
                <option value="zh-CN">中文普通话</option>
                <option value="en-US">English</option>
                <option value="yue-Hant-HK">粤语</option>
                <option value="ja-JP">日本語</option>
                <option value="ko-KR">한국어</option>
              </select>
            </label>

            <label class="field">
              <span>翻译为</span>
              <select id="targetLanguage">
                <option value="">关闭</option>
                <option value="zh-CN">中文</option>
                <option value="en-US">English</option>
                <option value="ja-JP">日本語</option>
                <option value="ko-KR">한국어</option>
              </select>
            </label>

            <fieldset class="segmented" aria-label="字号">
              <legend>字号</legend>
              <button type="button" data-font="large" aria-pressed="true">大</button>
              <button type="button" data-font="xlarge" aria-pressed="false">超大</button>
            </fieldset>

            <div class="toggle-row">
              <label class="switch">
                <input id="contrastToggle" type="checkbox">
                <span class="switch-track" aria-hidden="true"></span>
                <span>高对比</span>
              </label>

              <label class="switch">
                <input id="saveToggle" type="checkbox">
                <span class="switch-track" aria-hidden="true"></span>
                <span>保存</span>
              </label>
            </div>
          </div>
        </details>

        <details class="history-panel" id="historyPanel">
          <summary>
            <span>已保存对话</span>
            <strong id="historyCount">0</strong>
          </summary>
          <div class="history-list" id="historyList"></div>
          <button class="text-action" id="clearHistoryButton" type="button">清空记录</button>
        </details>
      </aside>

      <dialog class="session-dialog" id="sessionDialog">
        <form method="dialog">
          <h2>结束本次对话</h2>
          <p id="sessionSummary">本次对话尚未产生字幕。</p>
          <div class="dialog-actions">
            <button class="text-action" value="discard">不保存</button>
            <button class="main-action compact" value="save">保存</button>
          </div>
        </form>
      </dialog>
    </div>

    <script src="src/app.js" defer></script>
  </body>
</html>
